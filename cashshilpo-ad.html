<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cashshilpo | A Better Way</title>

    <!-- Tailwind for layout -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Premium Light-Theme Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- GSAP for Video Sequencing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
      :root {
        --bg-color: #f8fafc; /* Apple Light Gray */
        --text-dark: #0f172a; /* Slate 900 */
        --brand-blue: #2563eb;
        --brand-teal: #0d9488;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background-color: var(--bg-color);
        color: var(--text-dark);
        font-family: "Outfit", sans-serif;
        overflow: hidden;
        user-select: none;
      }

      /* Scenes exactly like video layers */
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        opacity: 0;
        visibility: hidden;
        z-index: 10;
      }

      .story-text {
        font-size: clamp(3rem, 6vw, 6rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        text-align: center;
        line-height: 1.1;
        margin: 0;
        position: absolute;
      }

      /* Act 1: The Chaos Graphics */
      .receipt {
        position: absolute;
        width: 120px;
        height: 160px;
        background: white;
        border: 1px solid #e2e8f0;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border-radius: 4px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        opacity: 0;
      }
      .receipt-line {
        height: 6px;
        background: #cbd5e1;
        border-radius: 3px;
      }
      .receipt-line.short {
        width: 50%;
      }
      .receipt-line.bold {
        background: #94a3b8;
        height: 10px;
        margin-bottom: 10px;
      }

      /* Act 2/3: The UI Graphics */
      .dashboard {
        width: 800px;
        max-width: 90vw;
        height: 500px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 1);
        border-radius: 24px;
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.08),
          0 10px 20px rgba(0, 0, 0, 0.04);
        display: flex;
        overflow: hidden;
        opacity: 0;
        transform: scale(0.9);
      }
      .sidebar {
        width: 200px;
        background: #f1f5f9;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .side-item {
        height: 20px;
        background: #e2e8f0;
        border-radius: 6px;
        width: 100%;
        opacity: 0;
        transform: translateX(-20px);
      }
      .main-area {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .header-bar {
        height: 40px;
        background: #f8fafc;
        border-radius: 12px;
        opacity: 0;
      }

      .grid-area {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex: 1;
      }
      .card-graph {
        background: white;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #f1f5f9;
        display: flex;
        align-items: flex-end;
        gap: 10px;
        opacity: 0;
        transform: translateY(20px);
      }
      .bar {
        width: 100%;
        background: linear-gradient(
          to top,
          var(--brand-teal),
          var(--brand-blue)
        );
        border-radius: 4px;
        transform-origin: bottom;
        transform: scaleY(0);
      }

      .card-list {
        background: white;
        border-radius: 16px;
        padding: 20px;
        border: 1px solid #f1f5f9;
        display: flex;
        flex-direction: column;
        gap: 12px;
        opacity: 0;
        transform: translateY(20px);
      }
      .list-item {
        height: 30px;
        background: #f8fafc;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
      }
      .circle {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: #e2e8f0;
      }
      .line {
        height: 8px;
        background: #e2e8f0;
        border-radius: 4px;
        width: 60%;
      }

      /* Act 4: Finale */
      .brand-text {
        font-size: clamp(4rem, 12vw, 10rem);
        font-weight: 900;
        background: linear-gradient(
          135deg,
          var(--brand-blue),
          var(--brand-teal)
        );
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.03em;
        line-height: 1;
      }

      .progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          var(--brand-blue),
          var(--brand-teal)
        );
        width: 0%;
        z-index: 1000;
      }

      .wipe-transition {
        position: absolute;
        inset: -10%;
        background: white;
        z-index: 50;
        clip-path: circle(0% at 50% 50%);
      }
    </style>
  </head>
  <body>
    <div class="progress-bar" id="progress"></div>

    <!-- WIPE TRANSITION ELEMENT -->
    <div class="wipe-transition" id="circle-wipe"></div>

    <!-- SCENE 1: The Story Begins (The Chaos) -->
    <div class="scene" id="scene1">
      <h1 class="story-text" id="s1-t1">You built your dream.</h1>
      <h1 class="story-text" id="s1-t2">But the reality...</h1>

      <!-- Falling Receipts representing chaos -->
      <div id="receipts-container" class="absolute inset-0 pointer-events-none">
        <!-- JavaScript will inject graphical receipts here -->
      </div>

      <h1 class="story-text text-red-500" id="s1-t3">Is overwhelming.</h1>
    </div>

    <!-- SCENE 2: The UI Construction (The Solution) -->
    <div class="scene" id="scene2" style="z-index: 60;">
      <h2
        class="story-text"
        id="s2-title"
        style="top: 10%; font-size: clamp(2rem, 4vw, 3rem); color: #64748b;"
      >
        Bring order to your business.
      </h2>

      <div class="dashboard" id="ui-dash">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="w-8 h-8 rounded bg-blue-600 mb-6"></div>
          <div class="side-item"></div>
          <div class="side-item"></div>
          <div class="side-item"></div>
          <div class="side-item"></div>
          <div class="side-item" style="margin-top: auto;"></div>
        </div>
        <!-- Main Content -->
        <div class="main-area">
          <div class="header-bar" id="ui-header"></div>
          <div class="grid-area">
            <!-- Graph Card -->
            <div class="card-graph" id="ui-graph">
              <div class="bar" style="height: 40%;"></div>
              <div class="bar" style="height: 60%;"></div>
              <div class="bar" style="height: 30%;"></div>
              <div class="bar" style="height: 80%;"></div>
              <div class="bar" style="height: 100%;"></div>
            </div>
            <!-- POS / List Card -->
            <div class="card-list" id="ui-list">
              <div class="list-item">
                <div class="circle"></div>
                <div class="line"></div>
              </div>
              <div class="list-item">
                <div class="circle"></div>
                <div class="line" style="width: 40%;"></div>
              </div>
              <div class="list-item">
                <div class="circle"></div>
                <div class="line" style="width: 80%;"></div>
              </div>
              <div class="list-item bg-blue-50 mt-auto border border-blue-100">
                <div class="font-bold text-blue-600 text-sm">TOTAL</div>
                <div class="font-bold text-blue-900">$4,250</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Floating Labels for Features -->
      <div
        class="absolute bg-white px-6 py-3 rounded-full shadow-lg font-bold text-blue-600 opacity-0 transform -translate-y-10"
        id="label-1"
        style="top: 30%; right: 15%;"
      >
        Lightning POS
      </div>
      <div
        class="absolute bg-white px-6 py-3 rounded-full shadow-lg font-bold text-teal-600 opacity-0 transform translate-y-10"
        id="label-2"
        style="bottom: 25%; left: 15%;"
      >
        Smart Analytics
      </div>
    </div>

    <!-- SCENE 3: The Climax / CTA -->
    <div class="scene bg-white" id="scene3" style="z-index: 70;">
      <p
        class="text-xl md:text-2xl font-semibold tracking-[0.3em] text-slate-400 uppercase mb-4"
        id="s3-sub"
      >
        Meet the standard.
      </p>
      <h1 class="brand-text" id="s3-brand">CASHSHILPO</h1>
      <p
        class="text-xl md:text-3xl font-light text-slate-500 mt-6 max-w-2xl text-center"
        id="s3-desc"
      >
        The ultimate POS & Business Management Software.
      </p>

      <div class="mt-12 opacity-0" id="s3-cta">
        <a
          href="https://cashshilpo.com"
          class="px-10 py-5 bg-slate-900 text-white rounded-full font-bold text-xl tracking-wide hover:bg-blue-600 hover:shadow-[0_10px_30px_rgba(37,99,235,0.3)] transition-all duration-300 transform hover:-translate-y-1 inline-block"
        >
          Start Your Journey
        </a>
        <p
          class="mt-6 text-slate-400 text-sm tracking-[0.2em] uppercase text-center font-mono"
        >
          cashshilpo.com
        </p>
      </div>
    </div>

    <script>
      // 1. Setup Elements
      gsap.set(".scene", { visibility: "visible" });
      gsap.set(".story-text", { opacity: 0, y: 30 });

      // Generate Receipts dynamically for Act 1
      const receiptContainer = document.getElementById("receipts-container");
      for (let i = 0; i < 15; i++) {
        let r = document.createElement("div");
        r.className = "receipt";
        r.style.left = `${Math.random() * 80 + 10}%`;
        r.style.top = `${Math.random() * -50 - 20}%`;
        r.style.transform = `rotate(${Math.random() * 60 - 30}deg)`;

        // Add lines to make it look like a graphical receipt
        r.innerHTML = `<div class="receipt-line bold"></div><div class="receipt-line"></div><div class="receipt-line short"></div><div class="receipt-line mt-4"></div><div class="receipt-line"></div>`;
        receiptContainer.appendChild(r);
      }

      // 2. THE MASTER TIMELINE (The Video Editor)
      const tl = gsap.timeline({
        onUpdate: function () {
          document.getElementById("progress").style.width =
            this.progress() * 100 + "%";
        },
      });

      // ACT 1: THE CHAOS
      tl.to("#scene1", { opacity: 1, duration: 0.1 })

        // "You built your dream"
        .to("#s1-t1", { opacity: 1, y: 0, duration: 1.5, ease: "power3.out" })
        .to("#s1-t1", {
          opacity: 0,
          y: -30,
          duration: 1,
          ease: "power3.in",
          delay: 1,
        })

        // "But the reality..."
        .to("#s1-t2", { opacity: 1, y: 0, duration: 1, ease: "power3.out" })

        // Receipts start raining down chaotically
        .to(
          ".receipt",
          {
            y: "150vh",
            opacity: 1,
            duration: 3,
            stagger: 0.1,
            ease: "none",
            rotation: "+=45",
          },
          "-=0.5",
        )

        .to("#s1-t2", { opacity: 0, scale: 0.9, duration: 0.5 }, "-=2")

        // "Is overwhelming" (Red text amidst the chaos)
        .to(
          "#s1-t3",
          { opacity: 1, scale: 1.2, duration: 1, ease: "back.out(2)" },
          "-=1.5",
        )
        .to("#s1-t3", {
          scale: 1.3,
          opacity: 0,
          duration: 1,
          ease: "power2.in",
          delay: 0.5,
        });

      // ACT 2: THE TRANSITION (The Clean Wipe)
      tl.to(
        "#circle-wipe",
        {
          clipPath: "circle(150% at 50% 50%)",
          duration: 1.5,
          ease: "power4.inOut",
        },
        "-=0.5",
      ).to("#scene1", { opacity: 0, duration: 0.1 }); // Hide scene 1 behind the wipe

      // ACT 3: THE SOFTWARE BUILD
      tl.to("#scene2", { opacity: 1, duration: 0.1 }, "-=1")

        // Title fades in
        .to("#s2-title", { opacity: 1, y: 0, duration: 1, ease: "power2.out" })

        // Dashboard pops in
        .to(
          "#ui-dash",
          { opacity: 1, scale: 1, duration: 1.5, ease: "elastic.out(1, 0.7)" },
          "-=0.5",
        )

        // Sidebar elements animate sequence
        .to(
          ".side-item",
          { opacity: 1, x: 0, duration: 0.4, stagger: 0.1, ease: "power2.out" },
          "-=1",
        )

        // Main UI areas slide up
        .to("#ui-header", { opacity: 1, duration: 0.5 }, "-=0.5")
        .to(
          ["#ui-graph", "#ui-list"],
          {
            opacity: 1,
            y: 0,
            duration: 0.8,
            stagger: 0.2,
            ease: "back.out(1.5)",
          },
          "-=0.3",
        )

        // Graph bars grow upward
        .to(".bar", {
          scaleY: 1,
          duration: 0.8,
          stagger: 0.1,
          ease: "power3.out",
        })

        // Feature Labels Pop out
        .to("#label-1", {
          opacity: 1,
          y: 0,
          duration: 0.8,
          ease: "back.out(1.5)",
        })
        .to(
          "#label-2",
          { opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.5)" },
          "-=0.4",
        )

        // Hold the software view, then pull it back
        .to("#scene2", {
          scale: 0.8,
          opacity: 0,
          filter: "blur(10px)",
          duration: 1.5,
          ease: "power3.inOut",
          delay: 2,
        });

      // ACT 4: THE RESOLUTION
      tl.to("#scene3", { opacity: 1, duration: 0.1 })

        // Subtitle drops in
        .fromTo(
          "#s3-sub",
          { opacity: 0, y: -20 },
          { opacity: 1, y: 0, duration: 1, ease: "power2.out" },
        )

        // Massive Brand Name Reveal
        .fromTo(
          "#s3-brand",
          { opacity: 0, scale: 1.5, filter: "blur(20px)" },
          {
            opacity: 1,
            scale: 1,
            filter: "blur(0px)",
            duration: 1.5,
            ease: "expo.out",
          },
          "-=0.5",
        )

        // Description fades up
        .fromTo(
          "#s3-desc",
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 1, ease: "power2.out" },
          "-=0.5",
        )

        // CTA Button pops
        .to("#s3-cta", {
          opacity: 1,
          y: -20,
          duration: 1,
          ease: "back.out(1.5)",
        })

        // Subtle continuous floating for the final logo
        .to("#s3-brand", {
          y: -10,
          duration: 2,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });

      // Force exactly 35 seconds of cinematic pacing
      tl.duration(35);
    </script>
  </body>
</html>
