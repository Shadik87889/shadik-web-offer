<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduHub - Educational Video Sharing</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configure Tailwind to use the signature orange color -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#ffa31a", // The signature orange accent color
              darkbg: "#000000",
              cardbg: "#1a1a1a",
            },
          },
        },
      };
    </script>
    <!-- FontAwesome for Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        background-color: #0f0f0f;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ffa31a;
      }
    </style>
  </head>
  <body>
    <!-- Header / Navbar -->
    <header class="bg-darkbg sticky top-0 z-50 border-b border-gray-800">
      <div
        class="container mx-auto px-4 h-16 flex items-center justify-between"
      >
        <!-- Logo area -->
        <div class="flex items-center space-x-4">
          <button class="text-gray-300 hover:text-white md:hidden">
            <i class="fas fa-bars text-xl"></i>
          </button>
          <a
            href="#"
            class="flex items-center text-2xl font-bold tracking-tight"
          >
            <span>Edu</span>
            <span class="bg-brand text-black px-1.5 ml-0.5 rounded-sm pb-0.5"
              >Hub</span
            >
          </a>
        </div>

        <!-- Search Bar (Desktop) -->
        <div class="hidden md:flex flex-1 max-w-2xl mx-8">
          <div
            class="flex w-full items-center bg-zinc-800 rounded-sm focus-within:ring-1 focus-within:ring-brand overflow-hidden"
          >
            <input
              type="text"
              placeholder="Search educational videos, channels..."
              class="bg-transparent text-gray-200 px-4 py-2 w-full focus:outline-none placeholder-gray-400"
            />
            <button
              class="bg-brand text-black px-5 py-2 font-bold hover:bg-orange-400 transition"
            >
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>

        <!-- User Actions -->
        <div class="flex items-center space-x-3">
          <button class="md:hidden text-gray-300 hover:text-white mr-2">
            <i class="fas fa-search"></i>
          </button>
          <button
            class="hidden sm:block text-gray-300 hover:text-brand font-semibold text-sm transition"
          >
            Login
          </button>
          <button
            class="bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-1.5 rounded-sm font-semibold text-sm transition border border-gray-700"
          >
            Sign Up
          </button>
        </div>
      </div>
    </header>

    <!-- Sub-Navigation (Categories) -->
    <nav class="bg-cardbg border-b border-gray-800 hidden md:block">
      <div
        class="container mx-auto px-4 flex space-x-8 text-sm font-semibold text-gray-400 py-3 overflow-x-auto"
      >
        <a
          href="#"
          class="text-white border-b-2 border-brand pb-3 -mb-3 flex items-center"
          ><i class="fas fa-home mr-2 text-brand"></i> Home</a
        >
        <a href="#" class="hover:text-white transition flex items-center"
          ><i class="fas fa-square-root-variable mr-2"></i> Mathematics</a
        >
        <a href="#" class="hover:text-white transition flex items-center"
          ><i class="fas fa-atom mr-2"></i> Science</a
        >
        <a href="#" class="hover:text-white transition flex items-center"
          ><i class="fas fa-code mr-2"></i> Programming</a
        >
        <a href="#" class="hover:text-white transition flex items-center"
          ><i class="fas fa-globe mr-2"></i> History</a
        >
        <a href="#" class="hover:text-white transition flex items-center"
          ><i class="fas fa-language mr-2"></i> Languages</a
        >
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
      <!-- Section Header -->
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold flex items-center">
          <i class="fas fa-fire text-brand mr-2"></i> Trending Educational
          Videos
        </h2>
        <div class="flex space-x-2 text-sm">
          <button
            class="bg-zinc-800 text-white px-3 py-1 rounded-sm hover:bg-brand hover:text-black transition"
          >
            Newest
          </button>
          <button
            class="bg-brand text-black font-semibold px-3 py-1 rounded-sm"
          >
            Top Rated
          </button>
        </div>
      </div>

      <!-- Video Grid container -->
      <div
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 gap-y-6"
        id="video-container"
      >
        <!-- Videos will be injected here via JS -->
      </div>
    </main>

    <!-- JavaScript to generate the video cards -->
    <script>
      // Dummy data for educational videos
      const videos = [
        {
          title: "Advanced Calculus: Integration by Parts",
          channel: "MathWizard",
          views: "1.2M",
          time: "2 months ago",
          duration: "14:20",
          img:
            "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Learn Python for Beginners - Full Course",
          channel: "CodeAcademy",
          views: "4.5M",
          time: "1 year ago",
          duration: "4:30:00",
          img:
            "https://images.unsplash.com/photo-1526379095098-d400fd0bf935?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Quantum Physics Explained in 10 Minutes",
          channel: "ScienceHub",
          views: "890K",
          time: "3 weeks ago",
          duration: "10:05",
          img:
            "https://images.unsplash.com/photo-1636466497217-26a8cbeaf0aa?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "World War II - Animated History",
          channel: "HistoryTime",
          views: "2.1M",
          time: "6 months ago",
          duration: "45:12",
          img:
            "https://images.unsplash.com/photo-1533038590840-1cbea6e60b8e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Photosynthesis: Crash Course Biology",
          channel: "BioLearner",
          views: "3.4M",
          time: "4 years ago",
          duration: "12:30",
          img:
            "https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Understanding Supply and Demand",
          channel: "Econ101",
          views: "450K",
          time: "1 month ago",
          duration: "08:15",
          img:
            "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Data Structures & Algorithms in Java",
          channel: "TechMastery",
          views: "900K",
          time: "5 months ago",
          duration: "2:15:00",
          img:
            "https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "How to read sheet music",
          channel: "MusicTheory",
          views: "1.8M",
          time: "2 years ago",
          duration: "16:45",
          img:
            "https://images.unsplash.com/photo-1507838153414-b4b713384a76?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Introduction to Organic Chemistry",
          channel: "ChemLab",
          views: "670K",
          time: "8 months ago",
          duration: "22:10",
          img:
            "https://images.unsplash.com/photo-1603126857599-f6e157824fce?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "The Roman Empire - Full Documentary",
          channel: "AncientWorlds",
          views: "5.5M",
          time: "3 years ago",
          duration: "1:30:00",
          img:
            "https://images.unsplash.com/photo-1552072092-7f9b8d63fd01?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Machine Learning Tutorial for Beginners",
          channel: "AIEducation",
          views: "3.2M",
          time: "1 year ago",
          duration: "4:00:00",
          img:
            "https://images.unsplash.com/photo-1501504905252-473c47e087f8?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
        {
          title: "Mastering English Grammar",
          channel: "PolyglotPro",
          views: "1.1M",
          time: "4 months ago",
          duration: "18:20",
          img:
            "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
        },
      ];

      const container = document.getElementById("video-container");

      // Loop through the data to generate HTML cards
      videos.forEach((video) => {
        const cardHTML = `
                <div class="group cursor-pointer">
                    <!-- Thumbnail -->
                    <div class="relative bg-zinc-800 rounded-sm overflow-hidden aspect-video mb-2">
                        <img src="${video.img}" alt="${video.title}" class="object-cover w-full h-full opacity-90 group-hover:opacity-100 transition duration-300">
                        <span class="absolute bottom-1 right-1 bg-black bg-opacity-80 text-white text-xs font-bold px-1.5 py-0.5 rounded-sm">
                            ${video.duration}
                        </span>
                        <!-- Play Icon Overlay on Hover -->
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300 bg-black bg-opacity-30">
                            <i class="fas fa-play-circle text-4xl text-white opacity-80"></i>
                        </div>
                    </div>
                    
                    <!-- Video Info -->
                    <div>
                        <h3 class="text-[15px] font-bold text-gray-100 leading-tight mb-1 group-hover:text-brand transition truncate" title="${video.title}">
                            ${video.title}
                        </h3>
                        <div class="flex items-center text-xs text-gray-400 justify-between">
                            <span class="hover:text-gray-200 transition font-semibold"><i class="fas fa-user-circle mr-1"></i>${video.channel}</span>
                        </div>
                        <div class="text-xs text-gray-500 mt-0.5">
                            <span>${video.views} views</span>
                            <span class="mx-1">•</span>
                            <span>${video.time}</span>
                        </div>
                    </div>
                </div>
            `;
        container.innerHTML += cardHTML;
      });
    </script>
  </body>
</html>
